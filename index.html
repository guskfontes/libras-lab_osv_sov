<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABORATÓRIO DE PRÁTICA 🤟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #334155; }
        .main-display {
            background-color: #1e293b;
            min-height: 520px;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #94a3b8;
            border: 1px solid #334155;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }
        .btn-purple { background-color: #5e5ce6; color: white; font-weight: 700; border-radius: 0.75rem; transition: 0.2s; }
        .btn-orange { background-color: #f7a21c; color: white; font-weight: 700; border-radius: 0.75rem; transition: 0.2s; }
        .btn-teal { background-color: #1db978; color: white; font-weight: 700; border-radius: 0.75rem; transition: 0.2s; }
        .btn-purple:hover, .btn-orange:hover, .btn-teal:hover { opacity: 0.9; transform: translateY(-1px); }
        .custom-input { border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; font-weight: bold; }
        .ai-content { color: #f1f5f9; width: 100%; text-align: left; }
        .ai-content h2 { color: #5e5ce6; font-weight: 800; margin-bottom: 1rem; font-size: 1.2rem; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .dialog-line { margin-bottom: 1rem; border-left: 4px solid #5e5ce6; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 0 0.5rem 0.5rem 0; }
        .libras-tag { display: inline-block; background: #334155; color: #1db978; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-top: 5px; }
        .loader { border: 4px solid #334155; border-top: 4px solid #5e5ce6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#5e5ce6] border-l-4 border-[#5e5ce6] pl-4 uppercase tracking-tighter">Laboratório de Prática ✨</h1>
            <p class="text-slate-400 mt-1 ml-5 text-xs font-bold uppercase tracking-widest">Ensino Bilíngue - Libras / PUC-SP / Derdic</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6 bg-slate-50 p-6 rounded-2xl border border-slate-100 shadow-sm">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Tema do Exercício:</label>
                    <select id="themeSelect" class="custom-input text-slate-700">
                        <option value="Cores Primárias">Cores Primárias</option>
                        <option value="Família e Parentesco">Família e Parentesco</option>
                        <option value="Saudações">Saudações</option>
                        <option value="Alimentos">Alimentos</option>
                        <option value="Profissões">Profissões</option>
                        <option value="Calendário e Datas">Calendário e Datas</option>
                    </select>
                </div>
                <button onclick="handleAI('dialogue')" class="btn-purple w-full py-4 px-6 flex items-center justify-center gap-2">
                    <i class="fas fa-comments text-lg"></i> Gerar Novo Diálogo ✨
                </button>
                <button onclick="handleAI('scenario')" class="btn-orange w-full py-4 px-6 flex items-center justify-center gap-2">
                    <i class="fas fa-image text-lg"></i> Criar Cenário ✨
                </button>
                <hr class="border-slate-200">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Escreva para Traduzir:</label>
                    <input type="text" id="translateInput" placeholder="Ex: EU BEBO CAFÉ" class="custom-input uppercase">
                    <button onclick="handleAI('translate')" class="btn-teal w-full py-4 px-6 mt-4 flex items-center justify-center gap-2">
                        <i class="fas fa-language text-lg"></i> Traduzir Estrutura ✨
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="mainDisplay" class="main-display">
                    <div id="placeholderText" class="text-center opacity-30">
                        <i class="fas fa-hand-paper text-6xl mb-4"></i>
                        <p class="font-bold uppercase tracking-widest text-xs">Aguardando comando...</p>
                    </div>
                    <div id="loading" class="hidden flex flex-col items-center gap-4">
                        <div class="loader"></div>
                        <p class="text-blue-400 font-bold text-xs uppercase tracking-widest">IA SINALIZANDO...</p>
                    </div>
                    <div id="contentResult" class="ai-content hidden overflow-y-auto max-h-[480px]"></div>
                </div>
                <footer class="mt-4 flex justify-between text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                    <span>PUC-SP / DERDIC</span>
                    <span>SEMESTRE 1 - 2026</span>
                </footer>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyBnooT-ANXOeZ6WFa78fsOHNftsq3rYX08";

        async function handleAI(type) {
            const display = document.getElementById('mainDisplay');
            const placeholder = document.getElementById('placeholderText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('contentResult');
            const theme = document.getElementById('themeSelect').value;
            const input = document.getElementById('translateInput').value;

            placeholder.classList.add('hidden');
            result.classList.add('hidden');
            loading.classList.remove('hidden');

            const systemMsg = "Você é um professor de Libras especialista em estrutura SOV e OSV. Responda APENAS com HTML puro: utilize <h2> para o título do tema e coloque cada frase traduzida dentro de <div class='dialog-line'>. Para cada tradução, adicione <span class='libras-tag'>ORDEM: XXX</span> indicando a sintaxe. Não use blocos de código markdown.";
            
            let userPrompt = "";
            if(type === 'dialogue') userPrompt = `Gere um diálogo curto (4 linhas) sobre o tema ${theme} com traduções para Libras.`;
            else if(type === 'scenario') userPrompt = `Crie um cenário de prática sobre ${theme} com 3 frases e suas traduções para Libras.`;
            else userPrompt = `Traduza para Libras (indicando se é SOV ou OSV) e explique a lógica da frase: "${input}"`;

            try {
                // ENDEREÇO CORRIGIDO PARA v1beta - O MAIS COMPATÍVEL COM O MODELO FLASH
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: `${systemMsg}\n\n${userPrompt}` }] 
                        }]
                    })
                });

                if (!response.ok) {
                    const errorDetails = await response.json();
                    throw new Error(errorDetails.error?.message || `Erro ${response.status}`);
                }

                const data = await response.json();
                const output = data.candidates[0].content.parts[0].text;

                loading.classList.add('hidden');
                result.classList.remove('hidden');
                // Limpeza de tags markdown caso a IA as envie por teimosia
                result.innerHTML = output.replace(/```html/g, '').replace(/```/g, '').trim();

            } catch (error) {
                console.error("Erro na chamada:", error);
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                result.innerHTML = `
                    <div class="text-center p-4">
                        <p class='text-red-500 font-bold'>⚠️ FALHA NA SINALIZAÇÃO</p>
                        <p class="text-slate-400 text-xs mt-2">${error.message}</p>
                        <p class="text-blue-400 text-[10px] mt-4 uppercase">Tente atualizar com CTRL+SHIFT+R</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
