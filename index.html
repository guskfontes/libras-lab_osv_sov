<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Laboratório de Prática de Libras - PUC-SP / Derdic">
    <title>Laboratório de Prática ✨ - Libras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff;
            color: #334155;
            -webkit-font-smoothing: antialiased;
        }

        /* Estilo do Visor Principal (Dark Mode Navy) */
        .main-display {
            background-color: #1e293b;
            min-height: 500px;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #94a3b8;
            position: relative;
            border: 1px solid #334155;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Botões conforme imagem do professor */
        .btn-purple { background-color: #5e5ce6; transition: all 0.2s; }
        .btn-purple:hover { background-color: #4b49c7; transform: translateY(-1px); }

        .btn-orange { background-color: #f7a21c; transition: all 0.2s; }
        .btn-orange:hover { background-color: #e59116; transform: translateY(-1px); }

        .btn-teal { background-color: #1db978; transition: all 0.2s; }
        .btn-teal:hover { background-color: #18a369; transform: translateY(-1px); }

        .custom-input {
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.2s;
        }
        .custom-input:focus {
            outline: none;
            border-color: #5e5ce6;
            box-shadow: 0 0 0 3px rgba(94, 92, 230, 0.1);
        }

        /* Estilização da Resposta da IA */
        .ai-content {
            color: #f1f5f9;
            width: 100%;
            height: 100%;
            text-align: left;
            overflow-y: auto;
        }
        .ai-content h2 { color: #5e5ce6; font-weight: 700; margin-bottom: 1.5rem; font-size: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }
        .ai-content .dialog-line { margin-bottom: 1.25rem; border-left: 4px solid #5e5ce6; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0 0.5rem 0.5rem 0; }
        .ai-content .libras-tag { 
            display: inline-block; 
            background: #334155; 
            color: #1db978; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.85rem; 
            font-weight: bold;
            margin-top: 8px;
        }
        .ai-content p { margin-bottom: 1rem; line-height: 1.6; }

        /* Loading Spinner */
        .loader {
            border: 4px solid #334155;
            border-top: 4px solid #5e5ce6;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .p-6 { padding: 1rem; }
            .main-display { min-height: 400px; padding: 1.5rem; }
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <!-- Título Principal -->
        <header class="mb-12">
            <h1 class="text-3xl md:text-4xl font-bold text-[#5e5ce6] flex items-center gap-3">
                <span class="border-l-4 border-[#5e5ce6] pl-4">Laboratório de Prática</span> ✨
            </h1>
            <p class="text-slate-400 mt-2 ml-5 text-sm uppercase tracking-widest font-semibold">Ensino Bilíngue - Libras / PUC-SP / Derdic</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 md:gap-12 items-start">
            
            <!-- Sidebar de Ferramentas -->
            <div class="space-y-8 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                
                <!-- Tema -->
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block">Tema para Diálogo/Cenário:</label>
                    <select id="themeSelect" class="custom-input bg-white font-semibold text-slate-700 shadow-sm">
                        <option value="Cores Primárias">Cores Primárias</option>
                        <option value="Família e Parentesco">Família e Parentesco</option>
                        <option value="Saudações e Apresentação">Saudações e Apresentação</option>
                        <option value="Meios de Transporte">Meios de Transporte</option>
                        <option value="Alimentos e Bebidas">Alimentos e Bebidas</option>
                        <option value="Profissões">Profissões</option>
                        <option value="Calendário e Datas">Calendário e Datas</option>
                    </select>
                </div>

                <!-- Botões de Geração -->
                <div class="space-y-4">
                    <button id="btnDialogue" onclick="handleAI('dialogue')" class="btn-purple w-full text-white font-bold py-4 px-6 rounded-xl shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-comments"></i> Gerar Novo Diálogo ✨
                    </button>

                    <button id="btnScenario" onclick="handleAI('scenario')" class="btn-orange w-full text-white font-bold py-4 px-6 rounded-xl shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-image"></i> Criar Cenário ✨
                    </button>
                </div>

                <hr class="border-slate-200">

                <!-- Tradução de Estrutura -->
                <div class="space-y-4">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block">Escrever para Traduzir:</label>
                    <input type="text" id="translateInput" placeholder="Ex: Eu prefiro vinho" class="custom-input text-slate-700 bg-white shadow-sm font-medium">
                    <button id="btnTranslate" onclick="handleAI('translate')" class="btn-teal w-full text-white font-bold py-4 px-6 rounded-xl shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-language"></i> Traduzir Estrutura ✨
                    </button>
                </div>

            </div>

            <!-- Display Principal (O visor da direita) -->
            <div class="lg:col-span-2">
                <div id="mainDisplay" class="main-display shadow-2xl transition-all duration-300">
                    <div id="placeholderText" class="text-center max-w-md">
                        <div class="text-5xl mb-6 opacity-20">🤟</div>
                        <p class="text-lg font-medium opacity-60">Escolha uma ferramenta de IA para gerar conteúdo dinâmico.</p>
                    </div>
                    
                    <div id="loading" class="hidden flex-col items-center gap-6">
                        <div class="loader"></div>
                        <p class="text-blue-400 font-bold tracking-widest uppercase text-xs">A IA está pensando...</p>
                    </div>
                    
                    <div id="contentResult" class="ai-content hidden">
                        <!-- Conteúdo da IA entra aqui -->
                    </div>
                </div>
                
                <footer class="mt-6 flex justify-between items-center text-slate-400 text-[10px] uppercase tracking-[0.2em] px-2">
                    <span>Derdic / PUC-SP</span>
                    <span>Semestre 1 - 2026</span>
                </footer>
            </div>

        </div>
    </div>

    <script>
        const apiKey = ""; // A chave é injetada pelo ambiente.

        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ text: "Você é um professor especialista em Libras (Língua Brasileira de Sinais). Sua tarefa é ajudar alunos a praticar. Ao traduzir frases do Português, use estritamente as estruturas SOV (Sujeito-Objeto-Verbo) ou OSV (Objeto-Sujeito-Verbo). Formate sua resposta em HTML limpo. Use <h2> para títulos e coloque cada linha de diálogo ou tradução dentro de um <div class='dialog-line'>. Para cada tradução, adicione uma etiqueta <span class='libras-tag'>ORDEM: XXX</span> indicando a estrutura usada. Não use blocos de código Markdown (```html), retorne apenas o HTML puro." }]
                }
            };

            // Exponential backoff
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API request failed');
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error('Empty response');
                    return text;
                } catch (e) {
                    if (i === delays.length) throw e;
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        async function handleAI(type) {
            const display = document.getElementById('mainDisplay');
            const placeholder = document.getElementById('placeholderText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('contentResult');
            const buttons = [document.getElementById('btnDialogue'), document.getElementById('btnScenario'), document.getElementById('btnTranslate')];

            // Bloquear botões enquanto carrega
            buttons.forEach(b => b.disabled = true);
            
            placeholder.classList.add('hidden');
            result.classList.add('hidden');
            loading.classList.remove('hidden');
            display.classList.add('items-center', 'justify-center');

            const theme = document.getElementById('themeSelect').value;
            const userInput = document.getElementById('translateInput').value;

            let prompt = "";
            if (type === 'dialogue') {
                prompt = `Gere um diálogo curto (máximo 4 falas) sobre o tema "${theme}". Para cada fala, forneça o texto em Português e a tradução correspondente na estrutura de Libras (SOV ou OSV).`;
            } else if (type === 'scenario') {
                prompt = `Crie um cenário prático (ex: numa recepção ou loja) sobre o tema "${theme}". Liste 3 frases em Português que o aluno deve saber e suas respectivas traduções para a estrutura de Libras.`;
            } else if (type === 'translate') {
                if (!userInput.trim()) {
                    alert("Por favor, digite uma frase para que eu possa traduzir!");
                    resetUI();
                    buttons.forEach(b => b.disabled = false);
                    return;
                }
                prompt = `Traduza a frase "${userInput}" para a estrutura de Libras (SOV ou OSV) e explique brevemente a lógica da ordem das palavras.`;
            }

            try {
                const aiResponse = await callGemini(prompt);
                
                // Limpeza de possíveis blocos de Markdown que a IA possa enviar por engano
                let cleanHtml = aiResponse.replace(/```html/g, '').replace(/```/g, '').trim();
                
                display.classList.remove('items-center', 'justify-center');
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                result.innerHTML = cleanHtml;
                
            } catch (error) {
                console.error(error);
                display.classList.add('items-center', 'justify-center');
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                result.innerHTML = `<div class="text-center"><p class="text-red-400 font-bold mb-2">Ops! Tivemos um problema na sinalização.</p><p class="text-slate-400 text-sm">Tente clicar no botão novamente.</p></div>`;
            } finally {
                buttons.forEach(b => b.disabled = false);
            }
        }

        function resetUI() {
            document.getElementById('placeholderText').classList.remove('hidden');
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('contentResult').classList.add('hidden');
            document.getElementById('mainDisplay').classList.add('items-center', 'justify-center');
        }

        document.getElementById('translateInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleAI('translate');
        });
    </script>
</body>
</html>
